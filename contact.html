<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Dr. El-Feki Podcast</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .contact-wrap { max-width: 600px; margin: 0 auto; padding: calc(var(--header-height) + 40px) 20px 80px; }
  .contact-wrap h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; text-align: center; }
  .contact-wrap .sub { text-align: center; color: var(--text-secondary); margin-bottom: 32px; }
  .contact-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; }
  .contact-card .form-group { margin-bottom: 16px; }
  .contact-card label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 0.85rem; }
  .contact-card input, .contact-card textarea { width: 100%; padding: 12px 16px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit; font-size: 0.95rem; }
  .contact-card textarea { min-height: 120px; resize: vertical; }
  .contact-card input:focus, .contact-card textarea:focus { outline: none; border-color: var(--accent); }
  .contact-card .submit-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-full); font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .contact-card .submit-btn:hover { background: var(--accent-hover); }
</style>
</head>
<body>
<header class="header" id="header">
  <div class="container nav-inner">
    <a href="index.html" class="logo"><span class="logo-icon">📖</span><span class="logo-text">Dr. El-Feki</span></a>
    <nav style="display:flex;gap:24px">
      <a href="index.html" class="nav-link">Home</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link active">Contact</a>
    </nav>
    <div class="nav-actions">
      <button id="themeToggle">🌙</button>
    </div>
  </div>
</header>

<div class="contact-wrap">
  <h1>📬 Contact Us</h1>
  <p class="sub">Have a question or suggestion? We'd love to hear from you.</p>
  <div class="contact-card">
    <form onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" required placeholder="Enter your name">
      </div>
      <div class="form-group">
        <label>Your Email</label>
        <input type="email" required placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea required placeholder="Write your message here..."></textarea>
      </div>
      <button type="submit" class="submit-btn">📤 Send Message</button>
    </form>
  </div>
</div>

<footer class="footer">
  <p>📖 Dr. Ibrahim El-Feki — Human Development Series</p>
  <p style="margin-top:4px">In loving memory — رحمه الله</p>
</footer>

<script src="config.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('elfeki_theme');
  const dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('elfeki_theme', next);
  });
});
function handleSubmit(e) {
  e.preventDefault();
  alert('Thank you for your message! We will get back to you soon.');
  e.target.reset();
}
</script>
</body>
</html>
