<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Dr. Ibrahim El-Feki</title>
  <link rel="stylesheet" href="style.v3.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
</head>
<body>

  <div class="stars-container"></div>

  <!-- Navigation -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <span>🎙️</span> Dr. El-Feki
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="admin.html" class="active">Admin</a></li>
    </ul>
    <div class="nav-right">
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
        <span class="theme-toggle-icon sun">☀️</span>
        <span class="theme-toggle-icon moon">🌙</span>
      </button>
    </div>
  </nav>

  <div class="page-content">
    <a href="index.html" class="back-btn" style="margin-bottom:24px;display:inline-flex;">← Back to Home</a>

    <!-- Login -->
    <div class="admin-login" id="adminLogin">
      <h2>🔐 Admin Login</h2>
      <div class="form-group">
        <label for="adminEmail">Email</label>
        <input type="email" id="adminEmail" class="form-input" placeholder="admin@example.com">
      </div>
      <div class="form-group">
        <label for="adminPassword">Password</label>
        <input type="password" id="adminPassword" class="form-input" placeholder="Password">
      </div>
      <button id="loginBtn" class="btn-primary">Login</button>
      <p id="loginError" style="color:#ef4444;text-align:center;margin-top:12px;display:none;">Invalid credentials</p>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <h1 style="margin:0;">Content Manager</h1>
        <div style="display:flex;gap:10px;">
          <button id="addChapterBtn" class="btn-action btn-play-all">+ Add Chapter</button>
          <button id="syncBtn" class="btn-action btn-shuffle">☁️ Sync to Cloud</button>
          <button id="logoutBtn" class="btn-action" style="background:#ef4444;color:#fff;">Logout</button>
        </div>
      </div>
      <div id="adminChapters"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="admin.html">Admin</a>
    </div>
    <p class="footer-copy">© 2026 Dr. Ibrahim El-Feki. All rights reserved.</p>
  </footer>

  <script src="app.v4.js"></script>
  <script>
    (function() {
      'use strict';

      const ADMIN_LS = 'elfeki-site_admin_auth';
      let chapters = [];

      function init() {
        // Check if already logged in
        if (localStorage.getItem(ADMIN_LS) === 'true') {
          showPanel();
        }

        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('addChapterBtn').addEventListener('click', addChapter);
        document.getElementById('syncBtn').addEventListener('click', syncCloud);

        // Enter key on password field
        document.getElementById('adminPassword').addEventListener('keydown', function(e) {
          if (e.key === 'Enter') login();
        });
      }

      function login() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        // Load admin credentials from data
        fetch('data.json').then(r => r.json()).then(data => {
          const admin = data.admin || {};
          if (admin.email && admin.password) {
            if (email === admin.email && password === admin.password) {
              localStorage.setItem(ADMIN_LS, 'true');
              showPanel();
            } else {
              document.getElementById('loginError').style.display = 'block';
            }
          } else {
            // No credentials set — allow any login (first time)
            localStorage.setItem(ADMIN_LS, 'true');
            showPanel();
          }
        }).catch(() => {
          // Fallback: allow any login
          localStorage.setItem(ADMIN_LS, 'true');
          showPanel();
        });
      }

      function logout() {
        localStorage.removeItem(ADMIN_LS);
        document.getElementById('adminLogin').style.display = 'block';
        document.getElementById('adminPanel').classList.remove('active');
      }

      function showPanel() {
        document.getElementById('adminLogin').style.display = 'none';
        document.getElementById('adminPanel').classList.add('active');
        loadChapters();
      }

      function loadChapters() {
        // Try localStorage first, then data.json
        try {
          const stored = localStorage.getItem('elfeki-site_chapters');
          if (stored) {
            chapters = JSON.parse(stored);
            renderAdmin();
            return;
          }
        } catch(e) {}

        fetch('data.json').then(r => r.json()).then(data => {
          chapters = data.chapters || [];
          renderAdmin();
        });
      }

      function saveChapters() {
        try {
          localStorage.setItem('elfeki-site_chapters', JSON.stringify(chapters));
          localStorage.setItem('elfeki-site_chapters_backup', JSON.stringify(chapters));
        } catch(e) {
          console.warn('Save failed:', e);
        }
      }

      function renderAdmin() {
        const container = document.getElementById('adminChapters');
        container.innerHTML = '';

        chapters.forEach((ch, ci) => {
          const div = document.createElement('div');
          div.className = 'admin-chapter';
          let songsHtml = '';
          ch.songs.forEach((song, si) => {
            songsHtml += `
              <div class="admin-song-row">
                <span style="width:24px;text-align:center;color:var(--text-muted);font-size:0.85rem;">${si+1}</span>
                <input type="text" value="${escAttr(song.title)}" data-ch="${ci}" data-si="${si}" data-field="title" class="song-title-input">
                <input type="text" value="${escAttr(song.audio)}" data-ch="${ci}" data-si="${si}" data-field="audio" class="song-audio-input" placeholder="Audio URL" style="min-width:180px;">
                <label class="btn-sm btn-upload" style="cursor:pointer;margin:0;">
                  📁 Upload
                  <input type="file" accept="audio/*" data-ch="${ci}" data-si="${si}" class="audio-upload-input" style="display:none;">
                </label>
                <button class="btn-sm btn-danger" data-ch="${ci}" data-si="${si}" data-action="delete-song">✕</button>
              </div>
              <div class="upload-status" id="status-${ci}-${si}"></div>
            `;
          });

          div.innerHTML = `
            <h3>${escHtml(ch.icon)} <input type="text" value="${escAttr(ch.name)}" data-ch="${ci}" data-field="chapter-name" class="chapter-name-input" style="font-size:1.1rem;font-weight:700;border:none;background:transparent;color:var(--text);padding:4px 8px;border-radius:4px;width:auto;flex:1;"> <button class="btn-sm btn-danger" data-ch="${ci}" data-action="delete-chapter">Delete Chapter</button></h3>
            ${songsHtml}
            <button class="btn-sm btn-add" data-ch="${ci}" data-action="add-song">+ Add Song</button>
          `;

          container.appendChild(div);
        });

        // Bind events
        container.querySelectorAll('.song-title-input, .song-audio-input').forEach(input => {
          input.addEventListener('change', function() {
            const ci = parseInt(this.dataset.ch);
            const si = parseInt(this.dataset.si);
            const field = this.dataset.field;
            chapters[ci].songs[si][field] = this.value;
            saveChapters();
          });
        });

        container.querySelectorAll('.chapter-name-input').forEach(input => {
          input.addEventListener('change', function() {
            const ci = parseInt(this.dataset.ch);
            chapters[ci].name = this.value;
            saveChapters();
          });
        });

        container.querySelectorAll('.audio-upload-input').forEach(input => {
          input.addEventListener('change', function() {
            const ci = parseInt(this.dataset.ch);
            const si = parseInt(this.dataset.si);
            const file = this.files[0];
            if (!file) return;
            const statusEl = document.getElementById('status-' + ci + '-' + si);
            statusEl.textContent = 'Uploading...';
            window.ElFeki.uploadToCloudinary(file).then(result => {
              const url = result.secure_url;
              chapters[ci].songs[si].audio = url;
              saveChapters();
              statusEl.textContent = '✅ Uploaded!';
              renderAdmin();
            }).catch(err => {
              statusEl.textContent = '❌ ' + err.message;
            });
          });
        });

        container.querySelectorAll('[data-action="delete-song"]').forEach(btn => {
          btn.addEventListener('click', function() {
            const ci = parseInt(this.dataset.ch);
            const si = parseInt(this.dataset.si);
            if (confirm('Delete "' + chapters[ci].songs[si].title + '"?')) {
              chapters[ci].songs.splice(si, 1);
              saveChapters();
              renderAdmin();
            }
          });
        });

        container.querySelectorAll('[data-action="add-song"]').forEach(btn => {
          btn.addEventListener('click', function() {
            const ci = parseInt(this.dataset.ch);
            const nextId = getMaxSongId() + 1;
            chapters[ci].songs.push({
              id: nextId,
              title: 'New Episode',
              audio: '',
              created: new Date().toISOString().split('T')[0]
            });
            saveChapters();
            renderAdmin();
          });
        });

        container.querySelectorAll('[data-action="delete-chapter"]').forEach(btn => {
          btn.addEventListener('click', function() {
            const ci = parseInt(this.dataset.ch);
            if (confirm('Delete chapter "' + chapters[ci].name + '" and all its songs?')) {
              chapters.splice(ci, 1);
              saveChapters();
              renderAdmin();
            }
          });
        });
      }

      function addChapter() {
        const nextId = getMaxChapterId() + 1;
        chapters.push({
          id: nextId,
          name: 'New Chapter',
          icon: '📖',
          songs: [{
            id: getMaxSongId() + 1,
            title: 'First Episode',
            audio: '',
            created: new Date().toISOString().split('T')[0]
          }]
        });
        saveChapters();
        renderAdmin();
      }

      function syncCloud() {
        const btn = document.getElementById('syncBtn');
        btn.textContent = '⏳ Syncing...';
        btn.disabled = true;
        window.ElFeki.syncToSupabase().then(() => {
          btn.textContent = '✅ Synced!';
          setTimeout(() => { btn.textContent = '☁️ Sync to Cloud'; btn.disabled = false; }, 2000);
        }).catch(err => {
          btn.textContent = '❌ Failed';
          setTimeout(() => { btn.textContent = '☁️ Sync to Cloud'; btn.disabled = false; }, 2000);
          console.error(err);
        });
      }

      function getMaxChapterId() {
        return chapters.reduce((max, ch) => Math.max(max, ch.id || 0), 0);
      }

      function getMaxSongId() {
        return chapters.reduce((max, ch) => {
          return ch.songs.reduce((m, s) => Math.max(m, s.id || 0), max);
        }, 0);
      }

      function escHtml(s) { return (s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
      function escAttr(s) { return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
